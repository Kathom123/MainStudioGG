<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Huerto Feliz - Jardinería</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Encabezado -->
  <header class="bg-success text-white text-center p-4">
    <h1>Huerto Feliz</h1>
    <p>10 años cuidando tus jardines</p>
  </header>

  <!-- Carrusel de Servicios -->
  <section class="container my-5">
    <h2 class="text-center">Nuestros Servicios</h2>
    <div id="serviciosCarousel" class="carousel slide" data-bs-ride="carousel">
      <div class="carousel-inner">
        <!-- Servicio 1 -->
        <div class="carousel-item active">
          <img src="imagenes/corte_pasto.jpg" class="d-block w-100" alt="Corte de pasto">
          <div class="carousel-caption bg-dark bg-opacity-50">
            <h5>Corte de pasto</h5>
            <p>Precio base: $20.000 (varía según requerimientos)</p>
          </div>
        </div>
        <!-- Servicio 2 -->
        <div class="carousel-item">
          <img src="imagenes/poda_arboles.jpg" class="d-block w-100" alt="Poda de árboles">
          <div class="carousel-caption bg-dark bg-opacity-50">
            <h5>Poda de árboles</h5>
            <p>Precio base: $30.000</p>
          </div>
        </div>
        <!-- Servicio 3 -->
        <div class="carousel-item">
          <img src="imagenes/jardineria.jpg" class="d-block w-100" alt="Jardinería general">
          <div class="carousel-caption bg-dark bg-opacity-50">
            <h5>Jardinería en general</h5>
            <p>Precio base: $25.000</p>
          </div>
        </div>
      </div>
      <button class="carousel-control-prev" type="button" data-bs-target="#serviciosCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#serviciosCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
      </button>
    </div>
  </section>

</body>
</html>
